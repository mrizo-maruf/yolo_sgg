# ============================================================================
# Default configuration — shared by run.py and bench.py
# ============================================================================

# --- Depth provider ---
# gt | pi3_online | pi3_offline | dav3_online | dav3_offline
depth_provider: gt

# --- YOLO model ---
is_open_vocabulary: false
yolo_model: "yoloe-11l-seg-pf.pt"
conf: 0.25
iou: 0.5
verbose: false
persistent: true
agnostic_nms: true
tracker_cfg: "botsort.yaml"
device: "0"

# --- Mask pre-processing ---
kernel_size: 5
alpha: 0.7
fast_mask: true

# --- Point cloud ---
max_points_per_obj: 2000
max_accumulated_points: 10000
o3_nb_neighbors: 50
o3std_ratio: 0.1

# --- Depth cache ---
# max_depth_cached: max number of depth frames held in RAM at once.
#   0   = load ALL depth frames upfront (fast but high memory — avoid for long sequences)
#   >0  = lazy LRU cache (recommended for sequences > ~200 frames)
max_depth_cached: 64

# --- Tracking registry ---
tracking_overlap_threshold: 0.1
tracking_distance_threshold: 1
tracking_inactive_limit: 0          # 0 = never remove
tracking_volume_ratio_threshold: 0.1
reprojection_visibility_threshold: 0.2

# --- Matching (benchmark) ---
iou_threshold: 0.3

# --- Classes to skip (structural / background) ---
skip_classes:
  - wall
  - floor
  - ceiling
  - roof
  - carpet
  - mat
  - ground
  - workspace
  - workplace
  - stairway
  - stairs
  - elevator
  - room
  - kitchen
  - bathroom
  - bedroom
  - living room
  - dining room
  - office
  - hallway
  - corridor
  - lobby
  - garage
  - basement
  - attic
  - sky
  - grass
  - field
  - lawn
  - building
  - house
  - warehouse
  - road
  - street
  - sidewalk
  - parking

_substring_skip:
  - room
  - shot
  - carpet
  - yard
  - floor
  - mat
  - resort
  - board
  - wall
  - blackboard
  - desk

# --- Scene-graph (run.py only) ---
ssg:
  show_pcds: false
  vis_graph: false
  print_resource_usage: false
  print_tracking_info: false
  save_graph_dir: "results/scene_graphs"

  # Edge predictors
  basic_edges: true
  baseline_edges: true
  vlsat_edges: true

  # Save
  save_local_graph: false
  save_global_graph: false

# --- Visualisation ---
visualization:
  enabled: false
  interval: 1
  show_matching: true
  show_2d: true
  show_windows: true
  save_dir: null
