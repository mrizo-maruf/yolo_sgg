# ============================================================================
# Default configuration — shared by run.py and bench.py
# ============================================================================

# --- Depth provider ---
# gt | pi3_online | pi3_offline | dav3_online | dav3_offline
depth_provider: gt

# --- YOLO model ---
is_open_vocabulary: true
yolo_model: "yoloe-11l-seg.pt"
conf: 0.25
iou: 0.5
verbose: false
persistent: true
agnostic_nms: true
tracker_cfg: "botsort.yaml"
device: "0"

# --- Mask pre-processing ---
kernel_size: 13
alpha: 0.7
fast_mask: true

# --- Point cloud ---
max_points_per_obj: 250
max_accumulated_points: 500
o3_nb_neighbors: 50
o3std_ratio: 0.1

# --- Depth cache ---
# max_depth_cached: max number of depth frames held in RAM at once.
#   0   = load ALL depth frames upfront (fast but high memory — avoid for long sequences)
#   >0  = lazy LRU cache (recommended for sequences > ~200 frames)
max_depth_cached: 64

# --- Tracking registry ---
tracking_overlap_threshold: 0.1
tracking_distance_threshold: 1
tracking_inactive_limit: 0          # 0 = never remove
tracking_volume_ratio_threshold: 0.1
reprojection_visibility_threshold: 0.2

# --- Matching (benchmark) ---
# One mode per benchmark run:
#   mask2d | bbox2d | bbox3d
match_mode: mask2d
iou_threshold: 0.3
# For 2D benchmark matching: when false, skip reprojection-only objects
# (their masks are stale from older frames).
benchmark_include_reprojected_masks: false

# --- Classes to skip (structural / background) ---
skip_classes:
  - wall
  - floor
  - ceiling
  - roof
  - carpet
  - mat
  - ground
  - workspace
  - workplace
  - stairway
  - stairs
  - elevator
  - room
  - kitchen
  - bathroom
  - bedroom
  - living room
  - dining room
  - office
  - hallway
  - corridor
  - lobby
  - garage
  - basement
  - attic
  - sky
  - grass
  - field
  - lawn
  - building
  - house
  - warehouse
  - road
  - street
  - sidewalk
  - parking

_substring_skip:
  - room
  - shot
  - carpet
  - yard
  - floor
  - mat
  - resort
  - board
  - wall
  - blackboard
  - desk

# --- Scene-graph (run.py only) ---
ssg:
  show_pcds: false
  vis_graph: false
  print_resource_usage: false
  print_tracking_info: false
  save_graph_dir: "results/scene_graphs"

  # Edge predictors
  basic_edges: false
  baseline_edges: true
  vlsat_edges: false
  # VL-SAT decoding controls (for kg_nav_run.py)
  # When model is multi-label, keep relations with score >= threshold.
  vlsat_relation_threshold: 0.35
  vlsat_max_relations_per_pair: 3
  # Force old argmax behavior if needed for A/B checks.
  vlsat_force_single_label: false
  # Keep at least one relation per directed pair among valid objects.
  vlsat_ensure_pairwise_edges: true
  # Objects with fewer accumulated points are excluded from VL-SAT.
  vlsat_min_points_per_object: 10
  # Print relation histogram for quick debugging.
  vlsat_debug_scores: false

  # Save
  save_local_graph: false
  save_global_graph: false

  # Rerun visualisation
  rerun: false
  vis_edge: false
  # Remap Isaac RFU (Z-up) to Rerun RDF for correct visual orientation.
  isaac_axis_fix: true

# --- Visualisation ---
visualization:
  enabled: false
  interval: 1
  show_matching: true
  show_2d: true
  show_3d: false
  show_windows: true
  save_dir: null
