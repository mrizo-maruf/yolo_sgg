# ============================================================================
# IsaacSim dataset overrides
# ============================================================================
# Inherits everything from default.yaml; override only what differs.

dataset: isaacsim

# --- IsaacSim camera intrinsics ---
image_width: 1280
image_height: 720
focal_length: 50
horizontal_aperture: 80
vertical_aperture: 45

# --- Depth conversion (16-bit PNG → metres) ---
min_depth: 0.01
max_depth: 10.0
png_max_value: 65535
# Pose indexing mode:
#   auto         -> infer from frame/depth numbering (000000 => index, 000001 => frame_number)
#   index        -> pose line i maps to frame i
#   frame_number -> pose line (frame_number - 1)
pose_lookup_mode: auto

# --- Offline Pi3 depth (for depth_provider: pi3_offline) ---
# Pi3 output dir from Pi3_for_yolo_sgg/run.py
pi3_offline_depth_dir: "pi3_depth"
# Pi3 camera poses saved by Pi3_for_yolo_sgg/run.py
pi3_offline_pose_path: "pi3_camera_poses.txt"
# Scene-level Sim(3) from align_pi3_gt.py --save_transform
pi3_offline_transform_path: "pi3_to_world_transform.json"
# If null, provider reads png_depth_scale from pi3_depth/pi3_depth_meta.txt
pi3_offline_png_depth_scale: null
pi3_offline_require_transform: true
pi3_offline_pose_lookup_mode: auto

# --- Offline DepthAnythingV3 (for depth_provider: dav3_offline) ---
dav3_offline_depth_dir: "dav3_depth"
dav3_offline_pose_path: "dav3_camera_poses.txt"

# IsaacSim-specific labels to skip in GT loading
loader_skip_labels:
  - wall
  - floor
  - ground
  - ceiling
  - background
  - unlabeled
  - unknown

load_rgb: true
load_depth: false
pi3: false
dav3: false
require_all_ids: true

