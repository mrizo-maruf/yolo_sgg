# ============================================================================
# IsaacSim dataset overrides
# ============================================================================
# Inherits everything from default.yaml; override only what differs.

dataset: isaacsim

# --- IsaacSim camera intrinsics ---
image_width: 1280
image_height: 720
focal_length: 50
horizontal_aperture: 80
vertical_aperture: 45

# --- Depth conversion (16-bit PNG → metres) ---
min_depth: 0.01
max_depth: 10.0
png_max_value: 65535

# IsaacSim-specific labels to skip in GT loading
loader_skip_labels:
  - wall
  - floor
  - ground
  - ceiling
  - background
  - unlabeled
  - unknown

load_rgb: true
load_depth: false
pi3: false
dav3: false
require_all_ids: true

scene_0_class_names:
  - "chair"
  - "box"
  - "table"
  - "teddy bear"
  - "ladder"
  - "stool"
  - "palm tree"
  - "clock"
  - "cabinet"
  - "chiffonier"
  - "lamp"
  - "vase"
  - "sofa"
  - "trash can"

save_graph_dir: "results/scene_graphs"
# class names for open vocabulary evaluation (if enabled)
