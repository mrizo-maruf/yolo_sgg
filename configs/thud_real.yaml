# ============================================================================
# THUD Real Scenes overrides
# ============================================================================

dataset: thud_real

# --- Depth encoding ---
depth_scale: 1000.0
depth_max_m: 100.0

# --- GT tracking distance for assigning persistent IDs ---
real_tracking_distance: 0.3

# --- Open-vocabulary class names to track (YOLOE set_classes) ---

track_classes:
  - door
  - chair
  - table
  - stool
  - people
  - shelf
  - robot

loader_skip_labels:
  - wall
  - floor
  - ground
  - ceiling
  - background

# --- Benchmark output ---
benchmark_metrics_path: results/thud_real_metrics
