# ============================================================================
# THUD Synthetic Scenes overrides
# ============================================================================

dataset: thud_synthetic

# --- Depth encoding ---
depth_scale: 1000.0     # raw uint16 → metres  (raw / depth_scale)
depth_max_m: 100.0

# --- Scene discovery ---
scene_type: static      # "static" or "dynamic"

# --- GT labels to ignore in the loader ---
loader_skip_labels:
  - wall
  - floor
  - ground
  - ceiling
  - background


