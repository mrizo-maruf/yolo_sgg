# --- Depth → point-cloud conversion constants ---
# These replicate the THUD Depth_to_pointcloud.py + ExportPointCloud.py
# pipeline.  Final coords: (x-right, y-forward, z-up) in metres.
pointcloud:
  x_divisor: 2.5          # Xr / x_divisor / unit_scale
  y_divisor: 6.5          # depth / y_divisor + y_offset
  y_offset:  200.0
  z_divisor: 2.0          # Zr / z_divisor + z_offset
  z_offset:  300.0
  unit_scale: 1000.0      # mm → m
  num_sample: 40000       # random sub-sample point count (0 = keep all)

# --- Benchmark output ---
benchmark_metrics_path: results/thud_synth_metrics