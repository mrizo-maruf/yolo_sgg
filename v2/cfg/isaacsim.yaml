# ============================================================================
# IsaacSim dataset overrides (v2)
# ============================================================================

dataset: isaacsim

# --- Camera ---
image_width: 1280
image_height: 720
focal_length: 50
horizontal_aperture: 80
vertical_aperture: 45

# --- Depth provider ---
depth_provider: "gt"        # gt | pi3_offline | pi3_online
png_max_value: 65535
max_depth: 10.0
min_depth: 0.01

# --- Loader ---
loader_skip_labels:
  - wall
  - floor
  - ground
  - ceiling
  - background
  - unlabeled
  - unknown

# --- Open-vocabulary class names per scene ---
class_names_to_track: []

scene_0_class_names:
  - "chair"
  - "box"
  - "table"
  - "teddy bear"
  - "ladder"
  - "stool"
  - "palm tree"
  - "clock"
  - "cabinet"
  - "chiffonier"
  - "lamp"
  - "vase"
  - "sofa"
  - "trash can"
