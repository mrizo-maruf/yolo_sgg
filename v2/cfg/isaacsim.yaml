# ============================================================================
# IsaacSim dataset overrides (v2)
# ============================================================================

dataset: isaacsim

# --- Camera ---
image_width: 1280
image_height: 720
focal_length: 50
horizontal_aperture: 80
vertical_aperture: 45

# --- Depth provider ---
depth_provider: "gt"        # gt | pi3_offline | pi3_online | dav3_offline | dav3_online
png_max_value: 65535
max_depth: 10.0
min_depth: 0.01

# Predicted depth/pose paths (relative to scene dir, or absolute)
pi3_offline_depth_dir: "pi3_depth"
pi3_offline_pose_path: "pi3_traj.txt"
dav3_offline_depth_dir: "dav3_depth"
dav3_offline_pose_path: "dav3_traj.txt"

# Online model parameters
pi3_model_name: "yyfz233/Pi3X"
pi3_window_size: 13
pi3_overlap: 5
dav3_model_name: "depth-anything-v3"
online_max_cache: 128

# --- Loader ---
loader_skip_labels:
  - wall
  - floor
  - ground
  - ceiling
  - background
  - unlabeled
  - unknown

# --- Open-vocabulary class names per scene ---
class_names_to_track: []

scene_0_class_names:
  - "chair"
  - "box"
  - "table"
  - "teddy bear"
  - "ladder"
  - "stool"
  - "palm tree"
  - "clock"
  - "cabinet"
  - "chiffonier"
  - "lamp"
  - "vase"
  - "sofa"
  - "trash can"
